<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulletMemo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e11;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7b61ff;
    --accent2: #ff6b6b;
    --text: #e8e8f0;
    --text2: #888899;
    --text3: #555566;
    --memo-color: #7b61ff;
    --file-color: #ff6b6b;
    --success: #4ecdc4;
    --radius: 10px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    width: 36px; height: 36px;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(123,97,255,0.08);
  }

  /* ── Layout ── */
  .container {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .search-wrap {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 14px 9px 36px;
    border-radius: var(--radius);
    font-family: var(--font-ui);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
    position: relative;
  }

  .search-wrap-inner {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input:focus { border-color: var(--accent); }

  .msg-list {
    overflow-y: auto;
    flex: 1;
  }

  .msg-list::-webkit-scrollbar { width: 4px; }
  .msg-list::-webkit-scrollbar-track { background: transparent; }
  .msg-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .msg-item:hover { background: var(--surface2); }
  .msg-item.active { background: rgba(123,97,255,0.1); border-left: 2px solid var(--accent); }

  .msg-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-icon.memo { background: rgba(123,97,255,0.15); color: var(--memo-color); }
  .msg-icon.file { background: rgba(255,107,107,0.15); color: var(--file-color); }
  .msg-icon.image { background: rgba(78,205,196,0.15); color: var(--success); }
  .msg-icon.audio { background: rgba(255,200,87,0.15); color: #ffc857; }
  .msg-icon.video { background: rgba(255,107,107,0.15); color: var(--file-color); }

  .msg-body { flex: 1; min-width: 0; }

  .msg-title {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .msg-meta {
    font-size: 0.72rem;
    color: var(--text3);
    font-family: var(--font-mono);
    display: flex;
    gap: 8px;
  }

  .msg-device {
    color: var(--text2);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.68rem;
  }

  /* ── Main panel ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-toolbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
  }

  .btn {
    padding: 8px 18px;
    border-radius: var(--radius);
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: #9580ff; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: rgba(255,107,107,0.1);
    color: var(--accent2);
    border: 1px solid rgba(255,107,107,0.2);
  }

  .btn-danger:hover { background: rgba(255,107,107,0.2); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .spacer { flex: 1; }

  /* ── Detail view ── */
  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text3);
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }

  .detail-header {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-memo { background: rgba(123,97,255,0.15); color: var(--memo-color); }
  .badge-file { background: rgba(255,107,107,0.15); color: var(--file-color); }

  .detail-meta {
    font-size: 0.78rem;
    color: var(--text2);
    font-family: var(--font-mono);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .detail-content {
    font-size: 0.95rem;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }

  .file-info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .file-big-icon {
    font-size: 40px;
    width: 64px; height: 64px;
    background: var(--surface);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .file-info-text { flex: 1; }
  .file-info-name {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
    word-break: break-all;
  }

  .file-info-size {
    font-size: 0.78rem;
    color: var(--text2);
    font-family: var(--font-mono);
  }

  /* ── Compose panel ── */
  .compose-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .compose-panel.open {
    display: flex;
    opacity: 1;
  }

  .compose-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 540px;
    max-width: 95vw;
    padding: 28px;
    transform: translateY(16px);
    transition: transform 0.2s;
  }

  .compose-panel.open .compose-box { transform: translateY(0); }

  .compose-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .compose-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--surface2);
    padding: 4px;
    border-radius: var(--radius);
  }

  .compose-tab {
    flex: 1;
    padding: 7px;
    border: none;
    background: none;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 0.82rem;
    font-weight: 600;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .compose-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius);
    font-family: var(--font-ui);
    font-size: 0.9rem;
    line-height: 1.6;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    min-height: 140px;
  }

  textarea:focus { border-color: var(--accent); }

  .file-drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.85rem;
  }

  .file-drop-zone:hover, .file-drop-zone.dragover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(123,97,255,0.05);
  }

  .file-drop-icon { font-size: 28px; margin-bottom: 10px; }
  .file-selected-name {
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--success);
    font-family: var(--font-mono);
  }

  .compose-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
  }

  /* ── Settings panel ── */
  .settings-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .settings-panel.open {
    display: flex;
    opacity: 1;
  }

  .settings-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 480px;
    max-width: 95vw;
    padding: 28px;
    transform: translateY(16px);
    transition: transform 0.2s;
  }

  .settings-panel.open .settings-box { transform: translateY(0); }

  .form-group { margin-bottom: 18px; }

  .form-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: var(--font-mono);
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-hint {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 5px;
    font-family: var(--font-mono);
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    position: fixed;
    top: 61px;
    left: 0; right: 0;
    height: 3px;
    background: var(--border);
    z-index: 150;
    display: none;
  }

  .progress-bar-wrap.show { display: block; }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    width: 0%;
    transition: width 0.3s;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 0.85rem;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s;
    max-width: 320px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* ── Loading state ── */
  .loading-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text3);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Unconfigured state ── */
  .unconfigured {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    text-align: center;
    padding: 32px;
  }

  .unconfigured-icon { font-size: 52px; opacity: 0.4; }

  /* ── Count badge ── */
  .count-badge {
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--text3);
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 20px;
  }

  /* ── Scrollbar for detail ── */
  .detail::-webkit-scrollbar { width: 4px; }

  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
    .main { display: none; }
    .container.detail-open .sidebar { display: none; }
    .container.detail-open .main { display: flex; }
  }

  /* ── Image thumbnail (sidebar) ── */
  .msg-thumbnail {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .msg-thumbnail:hover { opacity: 0.8; }
  .msg-thumbnail-placeholder {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    color: var(--success);
  }

  /* ── Image preview (detail panel) ── */
  .detail-image-wrap {
    margin-top: 20px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: inline-block;
    max-width: 100%;
    cursor: zoom-in;
    transition: opacity 0.15s;
  }
  .detail-image-wrap:hover { opacity: 0.9; }
  .detail-image {
    display: block;
    max-width: 100%;
    max-height: 560px;
    object-fit: contain;
  }
  .detail-image-hint {
    font-size: 0.72rem;
    color: var(--text3);
    font-family: var(--font-mono);
    padding: 6px 10px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  /* ── Lightbox (fullscreen viewer) ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
    animation: fadeIn 0.18s ease;
  }
  .lightbox.open { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .lightbox-img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.8);
    cursor: default;
    user-select: none;
  }

  .lightbox-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    z-index: 501;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.18); }

  /* ── Edit panel ── */
  .edit-panel {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .edit-panel.open {
    display: flex;
    opacity: 1;
  }

  .edit-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 540px;
    max-width: 95vw;
    padding: 28px;
    transform: translateY(16px);
    transition: transform 0.2s;
  }

  .edit-panel.open .edit-box { transform: translateY(0); }

  .edit-dates {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--text3);
    margin-bottom: 14px;
  }

  .edited-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #7b9fff;
    font-size: 0.72rem;
    font-family: var(--font-mono);
  }

  /* ── Polling bar ── */
  #polling-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-family: var(--font-mono);
    flex-wrap: wrap;
  }
  #polling-bar .polling-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
    user-select: none;
  }
  /* Toggle switch */
  .toggle-wrap {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: var(--text2);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: left 0.2s, background 0.2s;
  }
  .toggle-wrap input:checked + .toggle-track { background: var(--accent); }
  .toggle-wrap input:checked + .toggle-track::after {
    left: 19px;
    background: #fff;
  }
  #polling-interval {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    font-family: var(--font-mono);
    cursor: pointer;
    display: none;
  }
  #polling-interval.visible { display: inline-block; }
  #polling-status {
    margin-left: auto;
    color: var(--text3);
    font-size: 11px;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  #polling-status.active { color: var(--success); }
  #polling-status.updating {
    color: var(--accent);
    animation: pollingPulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pollingPulse {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    BulletMemo
  </div>
  <div class="header-actions">
    <span class="count-badge" id="countBadge">0 items</span>
    <button class="btn-icon" onclick="refreshMessages()" title="更新">↻</button>
    <button class="btn-icon" onclick="openSettings()" title="設定">⚙</button>
  </div>
</header>

<!-- Polling bar -->
<div id="polling-bar">
  <label class="polling-label">
    <span class="toggle-wrap">
      <input type="checkbox" id="pollingToggle">
      <span class="toggle-track"></span>
    </span>
    自動更新
  </label>
  <select id="polling-interval">
    <option value="30">30秒</option>
    <option value="60">60秒</option>
    <option value="120">120秒</option>
  </select>
  <span id="polling-status">OFF</span>
</div>
<div class="container" id="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="検索..." oninput="filterMessages(this.value)">
      </div>
    </div>
    <div class="msg-list" id="msgList">
      <div class="loading-overlay" id="loadingState">
        <div class="spinner"></div>
        <span>読み込み中...</span>
      </div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="main">
    <div class="main-toolbar" id="mainToolbar">
      <button class="btn btn-primary" onclick="openCompose()">＋ 新規メッセージ</button>
      <div class="spacer"></div>
      <button class="btn btn-danger" id="btnDelete" style="display:none" onclick="deleteSelected()">削除</button>
      <button class="btn btn-secondary" id="btnEdit" style="display:none" onclick="openEdit()">✏ 編集</button>
      <button class="btn btn-secondary" id="btnDownload" style="display:none" onclick="downloadSelected()">⬇ ダウンロード</button>
      <button class="btn btn-secondary" id="btnCopy" style="display:none" onclick="copySelected()">コピー</button>
    </div>
    <div class="detail" id="detail">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div>メッセージを選択してください</div>
      </div>
    </div>
  </div>
</div>

<!-- Compose panel -->
<div class="compose-panel" id="composePanel">
  <div class="compose-box">
    <div class="compose-title">
      <span>新規メッセージ</span>
      <button class="btn-icon" onclick="closeCompose()">✕</button>
    </div>
    <div class="compose-tabs">
      <button class="compose-tab active" id="tabMemo" onclick="switchTab('memo')">📝 メモ</button>
      <button class="compose-tab" id="tabFile" onclick="switchTab('file')">📎 ファイル</button>
    </div>
    <div id="memoPane">
      <textarea id="memoInput" placeholder="メモを入力..."></textarea>
    </div>
    <div id="filePane" style="display:none">
      <div class="file-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
           ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="file-drop-icon">📂</div>
        <div>クリックまたはドラッグ＆ドロップ（複数選択可）</div>
        <div style="font-size:0.75rem; margin-top:6px; color: var(--text3)">最大2GBまで対応</div>
        <div class="file-selected-name" id="selectedFileName"></div>
      </div>
      <input type="file" id="fileInput" style="display:none" multiple onchange="onFileSelected(this)">
    </div>
    <div class="compose-actions">
      <button class="btn btn-secondary" id="btnCancel" onclick="closeCompose()">キャンセル</button>
      <button class="btn btn-primary" id="btnSend" onclick="sendMessage()">送信</button>
    </div>
    <div id="uploadStatus" style="display:none; margin-top:10px; font-size:0.78rem; font-family:var(--font-mono); color:var(--text2); text-align:center;"></div>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-box">
    <div class="compose-title">
      <span>設定</span>
      <button class="btn-icon" onclick="closeSettings()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">このデバイスの名前</label>
      <input class="form-input" type="text" id="deviceInput" placeholder="PC, Windows など">
      <div class="form-hint">メッセージに表示されるデバイス名</div>
    </div>
    <div class="form-group">
      <label class="form-label">Dropbox 認証状態</label>
      <div id="authStatus" style="font-size:0.85rem; color:var(--text2); font-family:var(--font-mono); padding:8px 0;"></div>
    </div>
    <div class="compose-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">キャンセル</button>
      <button class="btn btn-secondary" id="btnReauth" onclick="startOAuth()">🔑 Dropboxで再認証</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- Edit panel -->
<div class="edit-panel" id="editPanel">
  <div class="edit-box">
    <div class="compose-title">
      <span id="editPanelTitle">編集</span>
      <button class="btn-icon" onclick="closeEdit()">✕</button>
    </div>
    <div class="edit-dates" id="editDates"></div>
    <div id="editMemoPane">
      <label class="form-label">メモ本文</label>
      <textarea id="editMemoInput" style="min-height:160px;"></textarea>
    </div>
    <div id="editFilePane" style="display:none">
      <label class="form-label">ファイル名</label>
      <input class="form-input" type="text" id="editFileNameInput">
      <div class="form-hint">※ Dropbox上の実ファイルのパスは変更されません</div>
    </div>
    <div class="compose-actions">
      <button class="btn btn-secondary" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Lightbox (fullscreen image viewer) -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" title="閉じる">✕</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
// ── State ──
let token = localStorage.getItem('bm_token') || '';
let refreshToken = localStorage.getItem('bm_refresh_token') || '';
let tokenExpiry = parseInt(localStorage.getItem('bm_token_expiry') || '0');
let deviceName = localStorage.getItem('bm_device') || 'PC';
let messages = [];
let selectedId = null;
let currentTab = 'memo';
let selectedFiles = []; // 複数ファイル対応
let uploadAbortController = null; // アップロードキャンセル用

const CONTENT_BASE = 'https://content.dropboxapi.com/2';
const API_BASE = 'https://api.dropboxapi.com/2';
const MESSAGES_PATH = '/messages.json';
const FILES_FOLDER = '/files';
const APP_KEY = 'dtcyhvor146kvw7';
const REDIRECT_URI = 'https://youm00.github.io/bullet-memo/';
const WORKER_URL = 'https://bullet-memo-auth.youm00.workers.dev';

// ── Image URL cache (filePath → {url, expiry}) ──
const imgUrlCache = {};

async function getImageUrl(filePath) {
  const now = Date.now();
  const cached = imgUrlCache[filePath];
  // Dropbox temporary_link は4時間有効。30分前に再取得
  if (cached && cached.expiry > now) return cached.url;

  await ensureValidToken();
  const res = await fetch(`${API_BASE}/files/get_temporary_link`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ path: filePath })
  });
  if (!res.ok) throw new Error(`一時URL取得失敗: HTTP ${res.status}`);
  const data = await res.json();
  imgUrlCache[filePath] = {
    url: data.link,
    expiry: now + (4 * 60 - 30) * 60 * 1000  // 3時間30分
  };
  return data.link;
}

// ── OAuth2 helpers ──
function startOAuth() {
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('oauth_state', state);
  const url = `https://www.dropbox.com/oauth2/authorize`
    + `?client_id=${APP_KEY}`
    + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    + `&response_type=code`
    + `&token_access_type=offline`
    + `&state=${state}`;
  location.href = url;
}

async function exchangeCodeForTokens(code) {
  const res = await fetch(`${WORKER_URL}/token/exchange`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
  });
  if (!res.ok) throw new Error('トークン取得失敗');
  const data = await res.json();
  saveTokens(data);
}

async function refreshAccessToken() {
  if (!refreshToken) throw new Error('再認証が必要です');
  const res = await fetch(`${WORKER_URL}/token/refresh`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: refreshToken })
  });
  if (!res.ok) throw new Error('トークン更新失敗');
  const data = await res.json();
  saveTokens(data);
}

function saveTokens(data) {
  token = data.access_token;
  if (data.refresh_token) {
    refreshToken = data.refresh_token;
    localStorage.setItem('bm_refresh_token', refreshToken);
  }
  // expiry: now + expires_in秒 - 5分バッファ
  const expiry = Date.now() + (data.expires_in - 300) * 1000;
  tokenExpiry = expiry;
  localStorage.setItem('bm_token', token);
  localStorage.setItem('bm_token_expiry', String(expiry));
}

async function ensureValidToken() {
  if (!refreshToken) throw new Error('認証されていません');
  if (Date.now() > tokenExpiry) {
    await refreshAccessToken();
  }
}

// ── Init ──
window.addEventListener('load', async () => {
  // OAuthコールバック処理
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (code && state && state === sessionStorage.getItem('oauth_state')) {
    sessionStorage.removeItem('oauth_state');
    history.replaceState({}, '', REDIRECT_URI);
    try {
      await exchangeCodeForTokens(code);
      showToast('認証成功！');
      fetchMessages();
    } catch (e) {
      showToast('認証失敗: ' + e.message, 'error');
      showUnconfigured();
    }
    return;
  }

  if (refreshToken) {
    try {
      await ensureValidToken();
      fetchMessages();
    } catch (e) {
      showUnconfigured();
      openSettings();
    }
  } else if (token) {
    // 旧方式トークンがある場合はそのまま使う
    fetchMessages();
  } else {
    showUnconfigured();
    openSettings();
  }
});

// ── UI helpers ──
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 3000);
}

function setProgress(pct) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  if (pct >= 100) {
    bar.style.width = '100%';
    setTimeout(() => { wrap.classList.remove('show'); bar.style.width = '0%'; }, 400);
  } else {
    wrap.classList.add('show');
    bar.style.width = pct + '%';
  }
}

function showUnconfigured() {
  document.getElementById('msgList').innerHTML = `
    <div class="unconfigured">
      <div class="unconfigured-icon">🔑</div>
      <div style="font-size:0.9rem; color:var(--text2)">設定からDropboxトークンを入力してください</div>
    </div>`;
  document.getElementById('detail').innerHTML = `
    <div class="empty-state"><div class="empty-icon">⚙</div><div>右上の設定アイコンからトークンを設定</div></div>`;
}

// ── Fetch messages ──
async function fetchMessages() {
  document.getElementById('msgList').innerHTML = `
    <div class="loading-overlay"><div class="spinner"></div><span>読み込み中...</span></div>`;
  setProgress(30);
  try {
    await ensureValidToken();
    const res = await fetch(`${CONTENT_BASE}/files/download`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Dropbox-API-Arg': dropboxHeader({ path: MESSAGES_PATH }),
      }
    });
    setProgress(80);
    if (res.status === 409) {
      messages = [];
    } else if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    } else {
      // 明示的にUTF-8としてデコードしてからJSONパース
      const bytes = await res.arrayBuffer();
      const text = new TextDecoder('utf-8').decode(bytes);
      messages = JSON.parse(text);
      messages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }
    setProgress(100);
    renderList(messages);
  } catch (e) {
    setProgress(100);
    document.getElementById('msgList').innerHTML = `
      <div class="unconfigured">
        <div class="unconfigured-icon">⚠️</div>
        <div style="color:var(--accent2); font-size:0.85rem">${e.message}</div>
        <button class="btn btn-secondary" style="margin-top:8px" onclick="fetchMessages()">再試行</button>
      </div>`;
    showToast('取得失敗: ' + e.message, 'error');
  }
}

function refreshMessages() { fetchMessages(); }

// ── Render list ──
function renderList(list) {
  document.getElementById('countBadge').textContent = `${list.length} items`;
  if (list.length === 0) {
    document.getElementById('msgList').innerHTML = `
      <div class="empty-state" style="padding:40px; color:var(--text3); font-size:0.85rem">メッセージがありません</div>`;
    return;
  }
  document.getElementById('msgList').innerHTML = list.map(m => {
    const isImage = m.type === 'file' && (m.mimeType || '').startsWith('image/');
    const thumbnailHtml = isImage
      ? `<div class="msg-thumbnail-placeholder" id="thumb-${m.id}" data-path="${escHtml(m.filePath || '')}">🖼️</div>`
      : '';
    return `
    <div class="msg-item ${m.id === selectedId ? 'active' : ''}" data-id="${m.id}" onclick="selectMessage('${m.id}')">
      <div class="msg-icon ${getIconClass(m)}" style="pointer-events:none;${isImage ? 'display:none' : ''}">${getIconEmoji(m)}</div>
      ${thumbnailHtml}
      <div class="msg-body" style="pointer-events:none">
        <div class="msg-title">${escHtml(m.type === 'memo' ? m.content.split('\n')[0] || '（空のメモ）' : m.content)}</div>
        <div class="msg-meta">
          <span>${formatDate(m.createdAt)}</span>
          <span class="msg-device">${escHtml(m.device || '')}</span>
          ${m.fileSize ? `<span>${formatSize(m.fileSize)}</span>` : ''}
          ${m.updatedAt ? `<span class="edited-badge">✏</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // サムネイルを非同期で読み込み
  list.forEach(m => {
    if (m.type === 'file' && (m.mimeType || '').startsWith('image/') && m.filePath) {
      loadThumbnail(m.id, m.filePath);
    }
  });
}

async function loadThumbnail(id, filePath) {
  const el = document.getElementById(`thumb-${id}`);
  if (!el) return;
  try {
    const url = await getImageUrl(filePath);
    // 要素がまだDOMにあるか確認
    const current = document.getElementById(`thumb-${id}`);
    if (!current) return;
    const img = document.createElement('img');
    img.className = 'msg-thumbnail';
    img.src = url;
    img.alt = '';
    img.style.pointerEvents = 'none';
    current.replaceWith(img);
  } catch (_) {
    // 失敗時はプレースホルダーのまま
  }
}

function filterMessages(q) {
  const filtered = q.trim()
    ? messages.filter(m => m.content.toLowerCase().includes(q.toLowerCase()))
    : messages;
  renderList(filtered);
  // 選択中アイテムのハイライトを復元
  if (selectedId) {
    const item = document.querySelector(`.msg-item[data-id="${selectedId}"]`);
    if (item) item.classList.add('active');
  }
}

// ── Select message ──
function selectMessage(id) {
  selectedId = id;
  const msg = messages.find(m => m.id === id);
  if (!msg) return;

  // Update list highlight
  document.querySelectorAll('.msg-item').forEach(e => e.classList.remove('active'));
  const item = document.querySelector(`.msg-item[data-id="${id}"]`);
  if (item) item.classList.add('active');

  // Show toolbar buttons
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('btnEdit').style.display = '';
  document.getElementById('btnCopy').style.display = msg.type === 'memo' ? '' : 'none';
  document.getElementById('btnDownload').style.display = msg.type === 'file' ? '' : 'none';

  // Render detail
  const detail = document.getElementById('detail');
  const dateStr = new Date(msg.createdAt).toLocaleString('ja-JP');
  const updatedStr = msg.updatedAt
    ? `<span class="edited-badge">✏ 最終編集: ${new Date(msg.updatedAt).toLocaleString('ja-JP')}</span>`
    : '';

  if (msg.type === 'memo') {
    detail.innerHTML = `
      <div class="detail-header">
        <div class="detail-type-badge badge-memo">📝 メモ</div>
        <div class="detail-meta">
          <span>${dateStr}</span>
          <span>${escHtml(msg.device || '')}</span>
          ${updatedStr}
        </div>
      </div>
      <div class="detail-content">${escHtml(msg.content)}</div>`;
  } else {
    const isImage = (msg.mimeType || '').startsWith('image/');
    if (isImage && msg.filePath) {
      // 画像ファイル：プレビューをメインに、ファイル情報はキャプションとして下に
      detail.innerHTML = `
        <div class="detail-header">
          <div class="detail-type-badge badge-file">🖼️ 画像</div>
          <div class="detail-meta">
            <span>${dateStr}</span>
            <span>${escHtml(msg.device || '')}</span>
            ${updatedStr}
          </div>
        </div>
        <div id="detailImageArea"><div style="color:var(--text3);font-size:0.8rem;font-family:var(--font-mono)">🖼️ 画像を読み込み中...</div></div>
        <div style="margin-top:12px; font-size:0.8rem; font-family:var(--font-mono); color:var(--text2);">
          ${escHtml(msg.content)}
          <span style="color:var(--text3); margin-left:10px;">${msg.mimeType || ''} ${msg.fileSize ? '· ' + formatSize(msg.fileSize) : ''}</span>
        </div>`;
      loadDetailImage(msg.filePath, msg.content);
    } else {
      // 画像以外のファイル：従来のカード表示
      detail.innerHTML = `
        <div class="detail-header">
          <div class="detail-type-badge badge-file">📎 ファイル</div>
          <div class="detail-meta">
            <span>${dateStr}</span>
            <span>${escHtml(msg.device || '')}</span>
            ${updatedStr}
          </div>
        </div>
        <div class="file-info-card">
          <div class="file-big-icon">${getIconEmoji(msg)}</div>
          <div class="file-info-text">
            <div class="file-info-name">${escHtml(msg.content)}</div>
            <div class="file-info-size">${msg.mimeType || ''} ${msg.fileSize ? '· ' + formatSize(msg.fileSize) : ''}</div>
          </div>
        </div>`;
    }
  }
}

// ── Image detail preview ──
async function loadDetailImage(filePath, altText) {
  const area = document.getElementById('detailImageArea');
  if (!area) return;
  try {
    const url = await getImageUrl(filePath);
    const areaEl = document.getElementById('detailImageArea');
    if (!areaEl) return; // ユーザーが別のメッセージを選んだ場合
    areaEl.innerHTML = `
      <div class="detail-image-wrap" onclick="openLightbox('${url.replace(/'/g,"\\'")}', '${escHtml(altText).replace(/'/g,"\\'")}')">
        <img class="detail-image" src="${url}" alt="${escHtml(altText)}">
        <div class="detail-image-hint">クリックで全画面表示</div>
      </div>`;
  } catch (e) {
    const areaEl = document.getElementById('detailImageArea');
    if (areaEl) areaEl.innerHTML = `<div style="color:var(--accent2);font-size:0.8rem;font-family:var(--font-mono)">画像の読み込みに失敗しました</div>`;
  }
}

// ── Lightbox ──
function openLightbox(url, alt) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = url;
  img.alt = alt || '';
  lb.classList.add('open');
  document.addEventListener('keydown', onLightboxKey);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
  document.removeEventListener('keydown', onLightboxKey);
}

function onLightboxKey(e) {
  if (e.key === 'Escape') closeLightbox();
}

// ── Copy / Download / Delete ──
function copySelected() {
  const msg = messages.find(m => m.id === selectedId);
  if (!msg) return;
  navigator.clipboard.writeText(msg.content);
  showToast('コピーしました');
}

async function downloadSelected() {
  const msg = messages.find(m => m.id === selectedId);
  if (!msg || !msg.filePath) return;

  showToast('ダウンロード開始...');
  setProgress(20);
  try {
    await ensureValidToken();
    const res = await fetch(`${CONTENT_BASE}/files/download`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Dropbox-API-Arg': dropboxHeader({ path: msg.filePath }),
      }
    });
    setProgress(80);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = msg.content;
    a.click();
    URL.revokeObjectURL(url);
    setProgress(100);
    showToast('ダウンロード完了');
  } catch (e) {
    setProgress(100);
    showToast('ダウンロード失敗: ' + e.message, 'error');
  }
}

async function deleteSelected() {
  const msg = messages.find(m => m.id === selectedId);
  if (!msg) return;
  if (!confirm(`「${msg.content.substring(0, 30)}」を削除しますか？`)) return;

  // Dropboxファイル削除
  if (msg.type === 'file' && msg.filePath) {
    try {
      await fetch(`${API_BASE}/files/delete_v2`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: msg.filePath })
      });
    } catch (_) {}
  }

  messages = messages.filter(m => m.id !== selectedId);
  selectedId = null;
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnCopy').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';
  document.getElementById('detail').innerHTML = `
    <div class="empty-state"><div class="empty-icon">💬</div><div>メッセージを選択してください</div></div>`;

  await saveMessages();
  renderList(messages);
  showToast('削除しました');
}

// ── Edit message ──
function openEdit() {
  const msg = messages.find(m => m.id === selectedId);
  if (!msg) return;

  const isMemo = msg.type === 'memo';
  document.getElementById('editPanelTitle').textContent = isMemo ? 'メモを編集' : 'ファイル名を編集';

  // 日時表示
  const createdStr = `作成: ${new Date(msg.createdAt).toLocaleString('ja-JP')}`;
  const updatedStr = msg.updatedAt ? `　最終編集: ${new Date(msg.updatedAt).toLocaleString('ja-JP')}` : '';
  document.getElementById('editDates').textContent = createdStr + updatedStr;

  if (isMemo) {
    document.getElementById('editMemoPane').style.display = '';
    document.getElementById('editFilePane').style.display = 'none';
    document.getElementById('editMemoInput').value = msg.content;
    setTimeout(() => document.getElementById('editMemoInput').focus(), 50);
  } else {
    document.getElementById('editMemoPane').style.display = 'none';
    document.getElementById('editFilePane').style.display = '';
    document.getElementById('editFileNameInput').value = msg.content;
    setTimeout(() => document.getElementById('editFileNameInput').focus(), 50);
  }

  document.getElementById('editPanel').classList.add('open');
}

function closeEdit() {
  document.getElementById('editPanel').classList.remove('open');
}

async function saveEdit() {
  const msg = messages.find(m => m.id === selectedId);
  if (!msg) return;

  const isMemo = msg.type === 'memo';
  const newContent = isMemo
    ? document.getElementById('editMemoInput').value
    : document.getElementById('editFileNameInput').value.trim();

  // 変更なしなら閉じるだけ
  if (newContent === msg.content || (!isMemo && newContent === '')) {
    closeEdit();
    return;
  }

  msg.content = newContent;
  msg.updatedAt = new Date().toISOString();

  try {
    await saveMessages();
    closeEdit();
    renderList(messages);
    selectMessage(selectedId); // detail を再描画
    showToast('保存しました');
  } catch (e) {
    showToast('保存失敗: ' + e.message, 'error');
  }
}

// ── Save messages ──
async function saveMessages() {
  await ensureValidToken();
  const content = JSON.stringify(messages);
  const res = await fetch(`${CONTENT_BASE}/files/upload`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': dropboxHeader({ path: MESSAGES_PATH, mode: 'overwrite', autorename: false, mute: true }),
    },
    body: new TextEncoder().encode(content)
  });
  if (!res.ok) throw new Error('保存失敗');
}

// ── Compose ──
function openCompose() {
  document.getElementById('composePanel').classList.add('open');
  document.getElementById('memoInput').focus();
}

function closeCompose() {
  // アップロード中であれば中断
  if (uploadAbortController) {
    uploadAbortController.abort();
    uploadAbortController = null;
    setProgress(100);
    showToast('アップロードをキャンセルしました', 'error');
  }
  document.getElementById('composePanel').classList.remove('open');
  document.getElementById('memoInput').value = '';
  selectedFiles = [];
  document.getElementById('selectedFileName').textContent = '';
  document.getElementById('fileInput').value = '';
  setUploadStatus('');
  // ボタン表示をリセット
  const btnCancel = document.getElementById('btnCancel');
  if (btnCancel) btnCancel.textContent = 'キャンセル';
  document.getElementById('btnSend').disabled = false;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabMemo').classList.toggle('active', tab === 'memo');
  document.getElementById('tabFile').classList.toggle('active', tab === 'file');
  document.getElementById('memoPane').style.display = tab === 'memo' ? '' : 'none';
  document.getElementById('filePane').style.display = tab === 'file' ? '' : 'none';
}

function onFileSelected(input) {
  selectedFiles = Array.from(input.files);
  updateSelectedFileNames();
}

function updateSelectedFileNames() {
  const el = document.getElementById('selectedFileName');
  if (selectedFiles.length === 0) {
    el.textContent = '';
  } else if (selectedFiles.length === 1) {
    el.textContent = selectedFiles[0].name;
  } else {
    el.textContent = `${selectedFiles.length}件選択: ${selectedFiles.map(f => f.name).join(', ')}`;
  }
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('dragover');
}

function onDragLeave(e) {
  document.getElementById('dropZone').classList.remove('dragover');
}

function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragover');
  selectedFiles = Array.from(e.dataTransfer.files);
  updateSelectedFileNames();
}

async function sendMessage() {
  const btn = document.getElementById('btnSend');
  const btnCancel = document.getElementById('btnCancel');
  btn.disabled = true;
  if (btnCancel) btnCancel.textContent = '⛔ 転送中断';

  uploadAbortController = new AbortController();

  try {
    if (currentTab === 'memo') {
      const text = document.getElementById('memoInput').value.trim();
      if (!text) { showToast('メモを入力してください', 'error'); return; }
      const msg = {
        id: Date.now().toString(),
        type: 'memo',
        content: text,
        createdAt: new Date().toISOString(),
        device: deviceName
      };
      messages.unshift(msg);
      await saveMessages();
      showToast('送信しました');
    } else {
      if (selectedFiles.length === 0) { showToast('ファイルを選択してください', 'error'); return; }

      const CHUNK_THRESHOLD = 150 * 1024 * 1024; // 150MB
      const total = selectedFiles.length;

      for (let i = 0; i < total; i++) {
        const file = selectedFiles[i];

        // 複数ファイル時はファイル番号を表示
        if (total > 1) {
          setUploadStatus(`ファイル ${i + 1} / ${total}：${file.name}`);
        }

        // 新しい AbortController を各ファイルごとに生成
        uploadAbortController = new AbortController();

        let data;
        if (file.size < CHUNK_THRESHOLD) {
          data = await uploadSmall(file);
        } else {
          data = await uploadSession(file);
        }

        const msg = {
          id: (Date.now() + i).toString(),
          type: 'file',
          content: data.name,
          filePath: data.path_display,
          fileSize: file.size,
          mimeType: file.type || 'application/octet-stream',
          createdAt: new Date().toISOString(),
          device: deviceName
        };
        messages.unshift(msg);
        await saveMessages();
        setProgress(0);
      }

      setProgress(100);
      setUploadStatus('');
      showToast(total > 1 ? `${total}件アップロード完了` : 'アップロード完了');
    }

    uploadAbortController = null;
    renderList(messages);
    closeCompose();
  } catch (e) {
    if (e.name === 'AbortError') return;
    setProgress(100);
    setUploadStatus('');
    showToast(e.message, 'error');
    uploadAbortController = null;
    btn.disabled = false;
    if (btnCancel) btnCancel.textContent = 'キャンセル';
  }
}

// ── 通常アップロード（150MB未満）──
async function uploadSmall(file) {
  setProgress(10);
  setUploadStatus(`アップロード中... ${formatSize(file.size)}`);
  const dropboxPath = `${FILES_FOLDER}/${file.name}`;
  const res = await fetch(`${CONTENT_BASE}/files/upload`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': dropboxHeader({ path: dropboxPath, mode: 'add', autorename: true }),
    },
    body: file,
    signal: uploadAbortController.signal,
  });
  setProgress(90);
  if (!res.ok) throw new Error(`アップロード失敗: HTTP ${res.status}`);
  return await res.json();
}

// ── セッションアップロード（150MB以上）──
async function uploadSession(file) {
  const CHUNK_SIZE = 8 * 1024 * 1024; // 8MB per chunk
  const totalSize = file.size;
  let offset = 0;
  const signal = uploadAbortController.signal;

  setUploadStatus(`大容量ファイル: チャンク分割アップロード開始...`);
  setProgress(2);

  // 1. セッション開始（最初のチャンク）
  const firstChunk = file.slice(0, Math.min(CHUNK_SIZE, totalSize));
  const startRes = await fetch(`${CONTENT_BASE}/files/upload_session/start`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': dropboxHeader({ close: false }),
    },
    body: firstChunk,
    signal,
  });
  if (!startRes.ok) throw new Error(`セッション開始失敗: HTTP ${startRes.status}`);
  const startData = await startRes.json();
  const sessionId = startData.session_id;
  offset += firstChunk.size;
  setProgress(Math.round((offset / totalSize) * 90));
  setUploadStatus(`アップロード中... ${formatSize(offset)} / ${formatSize(totalSize)}`);

  // 2. 中間チャンクを送信
  while (offset + CHUNK_SIZE < totalSize) {
    const chunk = file.slice(offset, offset + CHUNK_SIZE);
    const appendRes = await fetch(`${CONTENT_BASE}/files/upload_session/append_v2`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/octet-stream',
        'Dropbox-API-Arg': dropboxHeader({ cursor: { session_id: sessionId, offset }, close: false }),
      },
      body: chunk,
      signal,
    });
    if (!appendRes.ok) throw new Error(`チャンク送信失敗: HTTP ${appendRes.status} (offset: ${offset})`);
    offset += chunk.size;
    setProgress(Math.round((offset / totalSize) * 90));
    setUploadStatus(`アップロード中... ${formatSize(offset)} / ${formatSize(totalSize)}`);
  }

  // 3. 最終チャンクでセッション終了＆ファイル確定
  const lastChunk = file.slice(offset);
  const dropboxPath = `${FILES_FOLDER}/${file.name}`;
  const finishRes = await fetch(`${CONTENT_BASE}/files/upload_session/finish`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/octet-stream',
      'Dropbox-API-Arg': dropboxHeader({
        cursor: { session_id: sessionId, offset },
        commit: { path: dropboxPath, mode: 'add', autorename: true }
      }),
    },
    body: lastChunk,
    signal,
  });
  if (!finishRes.ok) throw new Error(`セッション終了失敗: HTTP ${finishRes.status}`);
  return await finishRes.json();
}

function setUploadStatus(msg) {
  const el = document.getElementById('uploadStatus');
  if (!el) return;
  el.style.display = msg ? 'block' : 'none';
  el.textContent = msg;
}

// ── Settings ──
function openSettings() {
  document.getElementById('deviceInput').value = deviceName;
  const authEl = document.getElementById('authStatus');
  if (refreshToken) {
    const exp = new Date(tokenExpiry + 300000).toLocaleString('ja-JP');
    authEl.innerHTML = `<span style="color:var(--success)">✓ 認証済み</span>（次回更新: ${exp}）`;
  } else {
    authEl.innerHTML = `<span style="color:var(--accent2)">✗ 未認証</span>　→「Dropboxで再認証」を押してください`;
  }
  document.getElementById('settingsPanel').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
}

async function saveSettings() {
  const d = document.getElementById('deviceInput').value.trim() || 'PC';
  deviceName = d;
  localStorage.setItem('bm_device', deviceName);
  closeSettings();
  showToast('設定を保存しました');
}

// ── Helpers ──
function getIconClass(m) {
  if (m.type === 'memo') return 'memo';
  const mime = m.mimeType || '';
  if (mime.startsWith('image/')) return 'image';
  if (mime.startsWith('audio/')) return 'audio';
  if (mime.startsWith('video/')) return 'video';
  return 'file';
}

function getIconEmoji(m) {
  if (m.type === 'memo') return '📝';
  const mime = m.mimeType || '';
  if (mime.startsWith('image/')) return '🖼️';
  if (mime.startsWith('audio/')) return '🎵';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.includes('pdf')) return '📄';
  return '📎';
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + 'MB';
  return (bytes/(1024*1024*1024)).toFixed(2) + 'GB';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function dropboxHeader(obj) {
  // ISO-8859-1範囲外の文字（日本語など）をUnicodeエスケープする
  return JSON.stringify(obj).replace(/[^\x00-\x7F]/g, c =>
    '\\u' + c.charCodeAt(0).toString(16).padStart(4, '0')
  );
}

// ============================================================
// ポーリング機能
// ============================================================
(function initPolling() {
  const toggle   = document.getElementById('pollingToggle');
  const interval = document.getElementById('polling-interval');
  const status   = document.getElementById('polling-status');

  let timer = null;
  let nextTick = 0; // 次回実行予定の timestamp
  let countdownTimer = null;

  // 設定を復元
  const savedEnabled  = localStorage.getItem('pollingEnabled') === 'true';
  const savedInterval = localStorage.getItem('pollingInterval') || '60';
  toggle.checked    = savedEnabled;
  interval.value    = savedInterval;
  if (savedEnabled) interval.classList.add('visible');

  function setStatus(text, cls) {
    status.textContent = text;
    status.className   = cls || '';
  }

  function formatTime(date) {
    return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      if (!timer) return; // ポーリング停止済みなら何もしない
      const remaining = Math.max(0, Math.round((nextTick - Date.now()) / 1000));
      setStatus(`次回更新まで ${remaining}秒`, 'active');
    }, 1000);
  }

  async function doPoll() {
    setStatus('更新中...', 'updating');
    try {
      await fetchMessages();
      setStatus(`最終更新: ${formatTime(new Date())}`, 'active');
    } catch (e) {
      setStatus('更新失敗', '');
    }
    // 次回カウントダウンを開始
    const sec = parseInt(interval.value, 10);
    nextTick = Date.now() + sec * 1000;
    startCountdown();
  }

  function startPolling() {
    stopPolling();
    const sec = parseInt(interval.value, 10);
    nextTick = Date.now() + sec * 1000;
    timer = setInterval(doPoll, sec * 1000);
    startCountdown();
  }

  function stopPolling() {
    if (timer)         { clearInterval(timer);         timer = null; }
    if (countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }
    setStatus('OFF', '');
  }

  toggle.addEventListener('change', () => {
    const enabled = toggle.checked;
    localStorage.setItem('pollingEnabled', enabled);
    interval.classList.toggle('visible', enabled);
    enabled ? startPolling() : stopPolling();
  });

  interval.addEventListener('change', () => {
    localStorage.setItem('pollingInterval', interval.value);
    if (toggle.checked) startPolling(); // 間隔変更時は即リスタート
  });

  // 初期状態
  if (savedEnabled) startPolling();
})();
</script>
